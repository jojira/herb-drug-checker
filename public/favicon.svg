<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Teal circle background -->
  <circle cx="16" cy="16" r="15" fill="#0f766e"/>
  
  <!-- Herb/plant icon in white -->
  <!-- Stem -->
  <line x1="16" y1="26" x2="16" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left leaf -->
  <ellipse cx="11" cy="15" rx="5.5" ry="3" transform="rotate(-30 11 15)" fill="white" opacity="0.95"/>
  
  <!-- Right leaf -->
  <ellipse cx="21" cy="15" rx="5.5" ry="3" transform="rotate(30 21 15)" fill="white" opacity="0.95"/>
  
  <!-- Top leaf -->
  <ellipse cx="16" cy="10" rx="3.5" ry="5.5" fill="white"/>
  
  <!-- Leaf vein details -->
  <line x1="11" y1="13" x2="14" y2="16" stroke="#0f766e" stroke-width="0.8" opacity="0.6"/>
  <line x1="21" y1="13" x2="18" y2="16" stroke="#0f766e" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="7" x2="16" y2="14" stroke="#0f766e" stroke-width="0.8" opacity="0.6"/>
